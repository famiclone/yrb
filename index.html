<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #bb86fc;
            --text: #e0e0e0;
            --text-muted: #a0a0a0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--surface);
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }
        h1 {
            font-size: 1.6rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }
        .btn {
            background-color: var(--primary);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin: 5px;
            font-weight: 600;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .mode-selection {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 1rem;
        }
        @media (min-width: 400px) {
            .mode-selection {
                flex-direction: row;
                justify-content: center;
            }
        }
        #manual-section, #result-section {
            display: none;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #333;
        }
        select {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            color: #fff;
            border: 1px solid #444;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }
        select:focus {
            border-color: var(--primary);
        }
        .result-link {
            display: inline-block;
            margin-top: 1rem;
            color: var(--primary);
            text-decoration: none;
            font-size: 1.1rem;
            word-break: break-all;
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #444;
            transition: border-color 0.2s;
        }
        .result-link:hover {
            border-color: var(--primary);
        }
        .count-badge {
            font-size: 0.8rem;
            color: var(--text-muted);
            display: block;
            margin-top: -15px;
            margin-bottom: 20px;
        }
    </style>
</head>

        // Helper function to generate X amount of random digits
        function getRandomDigits(length) {
            let res = '';
            for(let i = 0; i < length; i++) res += Math.floor(Math.random() * 10);
            return res;
        }

        function getRandomTimeHHMM() {
            const hours = String(Math.floor(Math.random() * 24)).padStart(2, '0');
            const minutes = String(Math.floor(Math.random() * 60)).padStart(2, '0');
            
            return `${hours}${minutes}`;
        }

        // Helper function to generate complex date objects
        function getRandomDateVars() {
            // Date between 2004 and today
            const start = new Date(2004, 0, 1).getTime();
            const end = new Date().getTime();
            const date = new Date(start + Math.random() * (end - start));
            
            const year = date.getFullYear().toString();
            const shortYear = year.substring(2); // e.g., 24 for 2024
            const monthNum = date.getMonth(); // 0 to 11
            const month = String(monthNum + 1).padStart(2, '0'); // 01 to 12
            const day = String(date.getDate()).padStart(2, '0'); // 01 to 31
            const daySingular = date.getDate().toString(); // 1 to 31
            
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const monthShorts = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            
            return {
                year: year,
                shortYear: shortYear,
                month: month,
                day: day,
                daySingular: daySingular,
                monthName: monthNames[monthNum],
                monthShort: monthShorts[monthNum],
                dateStr: `${year}${month}${day}` // YYYYMMDD
            };
        }

        // Core Query Builder 
        function buildQuery(template) {
            let query = template;
            const d = getRandomDateVars();

            // Regex magic: Replace anything like {4}, {2}, {6} with random digits dynamically
            query = query.replace(/\{(\d+)\}/g, function(match, p1) {
                return getRandomDigits(parseInt(p1, 10));
            });

            // Replace complex date formats
            query = query.replace(/\{date\}/g, d.dateStr);
            query = query.replace(/\{year\}/g, d.year);
            query = query.replace(/\{shortYear\}/g, d.shortYear);
            query = query.replace(/\{month\}/g, d.month);
            query = query.replace(/\{monthName\}/g, d.monthName);
            query = query.replace(/\{monthShort\}/g, d.monthShort);
            query = query.replace(/\{day\}/g, d.day);
            query = query.replace(/\{daySingular\}/g, d.daySingular);
            query = query.replace(/\{time\}/g, getRandomTimeHHMM());

            return `"${query}"`; // Quotes for exact match
        }

        function displayLink(query) {
            const linkElement = document.getElementById('youtube-link');
            // sp=CAI%3D is a YouTube system parameter for sorting by Upload Date
            const url = `https://www.youtube.com/results?search_query=${encodeURIComponent(query)}&sp=CAI%253D`;
            linkElement.href = url;
            linkElement.textContent = `Search: ${query}`;
            document.getElementById('result-section').style.display = 'block';
        }

        function setMode(mode) {
            document.getElementById('result-section').style.display = 'none';
            if (mode === 'manual') {
                document.getElementById('manual-section').style.display = 'block';
            } else if (mode === 'auto') {
                document.getElementById('manual-section').style.display = 'none';
                
                const randomPattern = patterns[Math.floor(Math.random() * patterns.length)];
                let query = buildQuery(randomPattern.template);
                displayLink(query);
            }
        }

        function generateManual() {
            const selectedIndex = document.getElementById('pattern-select').value;
            const pattern = patterns[selectedIndex];
            let query = buildQuery(pattern.template);
            displayLink(query);
        }
